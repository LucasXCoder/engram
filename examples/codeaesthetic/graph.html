<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>codeaesthetic — Engram brain</title>
<style>
  :root{
    --bg:#07080f; --panel:rgba(17,20,36,.72); --panel-solid:#11142b;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.14);
    --ink:#cdd3e0; --ink-dim:#8b91a7; --ink-bright:#f4f6fc; --accent:#6ea8ff;
    --radius:14px; --shadow:0 12px 40px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);overflow:hidden;
    font:13px/1.5 -apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{background:radial-gradient(120% 120% at 50% -10%,#0c1124 0%,#07080f 55%,#05060c 100%)}
  #cv{display:block;position:fixed;inset:0;touch-action:none}   /* main graph canvas only — NOT #mini */
  .glass{background:var(--panel);backdrop-filter:blur(16px) saturate(140%);
    -webkit-backdrop-filter:blur(16px) saturate(140%);border:1px solid var(--line);
    border-radius:var(--radius);box-shadow:var(--shadow)}
  button{font:inherit;color:inherit;cursor:pointer;background:none;border:none}

  /* ---- header (top-left) ---- */
  #hud{position:fixed;top:16px;left:16px;z-index:6;padding:12px 16px;max-width:34vw}
  #hud .name{font-size:16px;font-weight:650;color:var(--ink-bright);letter-spacing:.2px;
    display:flex;align-items:center;gap:8px}
  #hud .name .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 12px var(--accent);animation:pulse 2.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.55;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}
  #hud .meta{margin-top:5px;color:var(--ink-dim);font-variant-numeric:tabular-nums;font-size:12px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #hud .meta b{color:var(--ink);font-weight:600}

  /* ---- search (top-center) ---- */
  #searchwrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:7;
    display:flex;align-items:center;gap:8px;padding:8px 12px;width:min(42vw,340px)}
  #search{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--ink-bright);font-size:13px}
  #search::placeholder{color:var(--ink-dim)}
  #searchwrap svg{flex:none;opacity:.5}
  #searchcount{color:var(--ink-dim);font-size:11px;font-variant-numeric:tabular-nums;min-width:34px;text-align:right}

  /* ---- legend ---- */
  #legend{position:fixed;top:16px;right:16px;z-index:6;padding:10px 12px;max-width:230px;
    display:flex;flex-direction:column;gap:2px;max-height:60vh;overflow:auto}
  #legend .row{display:flex;align-items:center;gap:9px;padding:5px 7px;border-radius:9px;
    cursor:pointer;transition:background .15s,opacity .15s;user-select:none}
  #legend .row:hover{background:rgba(255,255,255,.06)}
  #legend .row.off{opacity:.34}
  #legend .sw{width:11px;height:11px;border-radius:4px;flex:none;transition:transform .15s}
  #legend .row:hover .sw{transform:scale(1.18)}
  #legend .lbl{flex:1;text-transform:capitalize}
  #legend .ct{color:var(--ink-dim);font-size:11px;font-variant-numeric:tabular-nums}

  /* ---- detail panel ---- */
  #detail{position:fixed;bottom:16px;left:16px;z-index:7;width:min(92vw,380px);padding:0;
    overflow:hidden;transform:translateY(140%);opacity:0;
    transition:transform .42s cubic-bezier(.2,.9,.25,1),opacity .3s}
  #detail.show{transform:translateY(0);opacity:1}
  #detail .bar{height:4px}
  #detail .body{padding:16px 18px 18px}
  #detail .tags{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:10px}
  #detail .chip{font-size:10.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;
    padding:3px 8px;border-radius:99px;border:1px solid var(--line-2);color:var(--ink-dim)}
  #detail .chip.ty{color:var(--ink-bright)}
  #detail .txt{font-size:14px;line-height:1.55;color:var(--ink-bright);margin:0 0 14px}
  #detail .src a{color:var(--accent);text-decoration:none;font-size:12px;
    display:inline-flex;align-items:center;gap:6px}
  #detail .src a:hover{text-decoration:underline}
  #detail .neigh{margin-top:14px;border-top:1px solid var(--line);padding-top:12px}
  #detail .neigh h4{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;
    color:var(--ink-dim);font-weight:600}
  #detail .nb{display:flex;gap:8px;padding:5px 0;cursor:pointer;align-items:baseline;
    border-radius:7px;transition:background .12s}
  #detail .nb:hover{background:rgba(255,255,255,.05)}
  #detail .rel{font-size:10px;color:var(--ink-dim);min-width:78px;flex:none;font-style:italic}
  #detail .nb .ntext{font-size:12px;color:var(--ink)}
  #detail .close{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:8px;
    color:var(--ink-dim);font-size:18px;line-height:24px;text-align:center;transition:.15s}
  #detail .close:hover{background:rgba(255,255,255,.08);color:var(--ink-bright)}

  /* ---- hover tooltip ---- */
  #tip{position:fixed;display:none;max-width:300px;z-index:8;padding:9px 11px;pointer-events:none;
    font-size:12px;line-height:1.45}
  #tip .tt{color:var(--ink-bright)}#tip .tm{opacity:.6;font-size:11px}

  /* ---- footer hint ---- */
  #hint{position:fixed;bottom:16px;right:16px;z-index:5;color:var(--ink-dim);font-size:11px;
    text-align:right;line-height:1.7;pointer-events:none;opacity:.7}
  #hint kbd{font:inherit;background:rgba(255,255,255,.07);border:1px solid var(--line);
    border-radius:5px;padding:1px 5px;color:var(--ink)}

  /* ---- loading + empty ---- */
  #load{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;background:var(--bg);transition:opacity .6s;color:var(--ink-dim)}
  #load.gone{opacity:0;pointer-events:none}
  .spinner{width:42px;height:42px;border-radius:50%;border:3px solid rgba(255,255,255,.1);
    border-top-color:var(--accent);animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #empty{position:fixed;inset:0;z-index:9;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:10px;color:var(--ink-dim);text-align:center;padding:24px}
  #empty h2{color:var(--ink-bright);margin:0;font-weight:600}
  #empty code{background:rgba(255,255,255,.07);padding:2px 7px;border-radius:6px;color:var(--ink)}

  /* ---- controls (confidence filter + export) ---- */
  #controls{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:6;
    display:flex;gap:6px;align-items:center;padding:7px 9px}
  #controls .seg{display:flex;gap:3px}
  #controls button{font-size:11px;font-weight:600;letter-spacing:.3px;color:var(--ink-dim);
    padding:5px 10px;border-radius:8px;border:1px solid transparent;transition:.15s}
  #controls button.on{color:var(--ink-bright);background:rgba(255,255,255,.08);border-color:var(--line-2)}
  #controls button:hover{color:var(--ink-bright)}
  #controls .sep{width:1px;height:18px;background:var(--line);margin:0 4px}
  /* minimap — full positioning here (id selector beats the #cv rule); pinned bottom-right */
  #mini{position:fixed;top:auto;left:auto;right:16px;bottom:58px;width:176px;height:116px;
    z-index:6;border-radius:10px;cursor:crosshair;background:rgba(8,10,22,.72)}

  @media (prefers-reduced-motion: reduce){
    .dot,.spinner{animation:none}
    #detail{transition:opacity .2s}
  }
  @media (max-width:900px){
    #hud .meta{display:none}        /* keep just the brain name so it can't reach the centered search */
    #mini{display:none}
  }
  @media (max-width:680px){
    #legend{max-width:150px;padding:8px}#legend .ct{display:none}
    #hint{display:none}#detail{width:calc(100vw - 32px)}
    #controls{bottom:12px}#searchwrap{width:min(60vw,300px)}
  }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="hud" class="glass">
  <div class="name"><span class="dot"></span><span id="bname">brain</span></div>
  <div class="meta"><b id="cAtoms">0</b> atoms · <b id="cEdges">0</b> edges · <b id="cTopics">0</b> topics</div>
</div>

<div id="searchwrap" class="glass">
  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input id="search" placeholder="Search atoms…  ( / )" autocomplete="off" spellcheck="false">
  <span id="searchcount"></span>
</div>

<div id="legend" class="glass"></div>

<div id="tip" class="glass"></div>

<div id="detail" class="glass">
  <div class="bar" id="dBar"></div>
  <button class="close" id="dClose" aria-label="Close">×</button>
  <div class="body">
    <div class="tags" id="dTags"></div>
    <p class="txt" id="dTxt"></p>
    <div class="src" id="dSrc"></div>
    <div class="neigh" id="dNeigh"></div>
  </div>
</div>

<div id="controls" class="glass">
  <div class="seg" id="confSeg"></div>
  <div class="sep"></div>
  <button id="exportBtn" title="Download a PNG of the current view">⤓ PNG</button>
</div>

<canvas id="mini" class="glass" title="Overview — click to jump"></canvas>

<div id="hint">
  <kbd>/</kbd> search · <kbd>F</kbd> fit · <kbd>Esc</kbd> close · drag a node · scroll to zoom
</div>

<div id="empty">
  <h2>This brain has no atoms yet</h2>
  <div>Build one with <code>python -m engram build &lt;brain&gt;</code>, then reopen this page.</div>
</div>

<div id="load"><div class="spinner"></div><div>settling the graph…</div></div>

<script>
const DATA = {"name": "codeaesthetic", "nodes": [{"id": "fp01", "x": 930.3, "y": -282.1, "t": "functional", "ty": "opinion", "c": "CORE", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Functional programming is awesome, but functional programmers are bad marketers — jargon like currying, monads, and binding functors confuses people."}, {"id": "fp02", "x": 1028.7, "y": -262.0, "t": "functional", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "These concepts lie on a spectrum between the math of category theory / lambda calculus and their specific mapping to each language&#x27;s implementation."}, {"id": "fp03", "x": 739.2, "y": -72.6, "t": "functional", "ty": "definition", "c": "CORE", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "A function is a pure, elegant thing that takes an input and gives an output, and the same input always gives the same output."}, {"id": "fp04", "x": 616.4, "y": 1.7, "t": "functional", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "What guarantees the same output forever is having no side effects and no state."}, {"id": "fp05", "x": 684.5, "y": -66.3, "t": "functional", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "A pure function contains nothing inside it that isn&#x27;t directly derived from the input."}, {"id": "fp06", "x": 687.5, "y": -230.9, "t": "functional", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Once you introduce state, the outcome of a function can vary based on that state."}, {"id": "fp07", "x": -354.8, "y": -358.3, "t": "philosophy", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Most programming paradigms are really just different takes on how you manage state — it&#x27;s all about state."}, {"id": "fp08", "x": 476.9, "y": -139.5, "t": "functional", "ty": "definition", "c": "CORE", "at": "creator", "r": 6.0, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Functional programming takes one extreme of the state question: there shall be no state."}, {"id": "fp09", "x": 876.8, "y": 203.2, "t": "functional", "ty": "method", "c": "CORE", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "You transform inputs into outputs by composing and connecting functions — hooking inputs and outputs into one long chain that achieves the program&#x27;s goal."}, {"id": "fp10", "x": 918.8, "y": -45.2, "t": "functional", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "In pure FP there are no objects or structures in memory that you mutate to track what&#x27;s going on."}, {"id": "fp11", "x": 947.1, "y": -197.9, "t": "functional", "ty": "claim", "c": "CORE", "at": "creator", "r": 4.6, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "You&#x27;re not allowed to mutate variables: once you set a value you cannot change it again."}, {"id": "fp12", "x": 1048.2, "y": -173.1, "t": "functional", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Conventional iteration loops (for and while) are impossible in pure FP because they require mutating a variable that tracks how many times you&#x27;ve iterated."}, {"id": "fp13", "x": 773.5, "y": -222.6, "t": "functional", "ty": "opinion", "c": "STATED", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "The functional answer to &#x27;how do you loop&#x27; is usually &#x27;more functions&#x27; — when all you have is a hammer."}, {"id": "fp14", "x": 778.1, "y": 202.8, "t": "functional", "ty": "method", "c": "STATED", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "To loop functionally, pull the part you want to repeat out into its own function."}, {"id": "fp15", "x": 795.2, "y": 48.5, "t": "functional", "ty": "method", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Replicate the for loop&#x27;s index increment by creating a new variable (next index) instead of mutating index, since you can&#x27;t mutate."}, {"id": "fp16", "x": 990.9, "y": -91.9, "t": "functional", "ty": "method", "c": "STATED", "at": "creator", "r": 4.6, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Repeat by having the function call itself recursively with the next index."}, {"id": "fp17", "x": 837.5, "y": -300.4, "t": "functional", "ty": "caveat", "c": "STATED", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Without a stopping condition the recursion calls forever until it goes beyond the array size and throws an error."}, {"id": "fp18", "x": 640.6, "y": -144.8, "t": "functional", "ty": "method", "c": "STATED", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "The for loop&#x27;s condition maps to: only execute the body if the condition (index still in range) is met, which breaks the recursion so all the functions return."}, {"id": "fp19", "x": 1065.3, "y": -59.7, "t": "functional", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Recursion is just a fancier form of iteration."}, {"id": "fp20", "x": 954.2, "y": 40.7, "t": "functional", "ty": "method", "c": "STATED", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "The for loop&#x27;s starting point maps to the first call into the recursive loop."}, {"id": "fp21", "x": 815.0, "y": -134.4, "t": "functional", "ty": "method", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "To return matching results, build an array with the current item at the front and the results of the deeper recursive calls appended to the end, preserving order."}, {"id": "fp22", "x": 1057.8, "y": 159.5, "t": "functional", "ty": "method", "c": "STATED", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Only append the current item if it matches the condition; otherwise pass through the previous result unchanged; base case returns empty when the list is fully processed."}, {"id": "fp23", "x": 881.4, "y": 86.0, "t": "functional", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "This find-in-array pattern recurs everywhere; the only difference between such functions is the condition in the if statement."}, {"id": "fp24", "x": 826.0, "y": 269.6, "t": "functional", "ty": "method", "c": "CORE", "at": "creator", "r": 4.6, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Replace the three near-identical functions with one by passing in a function that returns whether an item should be included."}, {"id": "fp25", "x": 847.5, "y": -71.5, "t": "functional", "ty": "definition", "c": "STATED", "at": "creator", "r": 5.3, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "The passed-in condition function is called a predicate; the generalized function becomes a generic filter."}, {"id": "fp26", "x": 1120.1, "y": -129.8, "t": "functional", "ty": "caveat", "c": "STATED", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Problem: the userID-equals function needs two parameters (receipt and userID) but filter only passes the receipt, so the userID to compare against is unknown."}, {"id": "fp27", "x": 834.0, "y": 149.7, "t": "functional", "ty": "method", "c": "CORE", "at": "creator", "r": 4.6, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Solution: have the function take only the userID and construct and return a new function that takes a receipt and checks it; pass that returned function into filter."}, {"id": "fp28", "x": 767.1, "y": 7.4, "t": "functional", "ty": "concept", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "The userID acts as a secret extra parameter bound to the returned function, which remembers that value and uses it later."}, {"id": "fp29", "x": 660.2, "y": 113.6, "t": "functional", "ty": "definition", "c": "CORE", "at": "creator", "r": 4.6, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Currying: instead of handling the entire operation at once, return a function that handles the next part of the operation with the previous state bound to it."}, {"id": "fp30", "x": 1052.8, "y": 67.5, "t": "functional", "ty": "opinion", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "It&#x27;s ironic that FP is sold as so different from OOP, yet binding data this way creates an instance of a function with bound data — the mirror image of an OOP instance of data with bound functions."}, {"id": "fp31", "x": 1124.4, "y": 15.5, "t": "functional", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Manual currying is an older approach; you can automate it in JavaScript and many languages using bind."}, {"id": "fp32", "x": 989.7, "y": 116.0, "t": "functional", "ty": "method", "c": "CORE", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "The modern preferred way is the lambda function: move the check right into an inline function."}, {"id": "fp33", "x": 1010.7, "y": -22.5, "t": "functional", "ty": "example", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "With lambdas you can filter by user, filter by merchant, or do a more complex check such as the total being in a range."}, {"id": "fp34", "x": 979.9, "y": 209.8, "t": "functional", "ty": "definition", "c": "CORE", "at": "creator", "r": 4.6, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "map is a function that takes a function giving the desired result for each element and inserts that transformed element into the new array."}, {"id": "fp35", "x": 911.9, "y": 140.5, "t": "functional", "ty": "definition", "c": "STATED", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "take(count) gives you up to &#x27;count&#x27; elements from the array, and is chainable."}, {"id": "fp36", "x": 715.9, "y": 29.4, "t": "functional", "ty": "concept", "c": "CORE", "at": "creator", "r": 6.699999999999999, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Chaining filter, map, and take creates a data pipeline: the code declares WHAT should happen while the HOW stays hidden in the fundamental functions."}, {"id": "fp37", "x": 925.4, "y": 286.4, "t": "functional", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "These functional fundamentals (filter, map, take) are built directly into JavaScript."}, {"id": "fp38", "x": 889.3, "y": -100.6, "t": "functional", "ty": "example", "c": "STATED", "at": "creator", "r": 5.3, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Worked example goal: grab each receipt, look up its transaction, filter unsettled or mismatched ones, sort by the most egregious discrepancy, take the top 10, and display them in a dashboard."}, {"id": "fp39", "x": 729.9, "y": 127.8, "t": "functional", "ty": "method", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Use the built-in array map with a lambda to transform each receipt into a result object holding the receipt, final transaction, and discrepancy."}, {"id": "fp40", "x": 581.0, "y": -79.5, "t": "functional", "ty": "method", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Convert skip-over logic into a filter by inverting the conditions so they describe what to keep instead of what to ignore."}, {"id": "fp41", "x": 880.2, "y": -219.4, "t": "functional", "ty": "method", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "sort takes a comparator returning negative if a&lt;b and positive if a&gt;b; subtracting b from a sorts ascending, so subtract a from b to order biggest-first."}, {"id": "fp42", "x": 673.9, "y": 206.1, "t": "functional", "ty": "method", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Use slice to take only the count number of elements at the end of the pipeline."}, {"id": "fp43", "x": 728.2, "y": -141.1, "t": "functional", "ty": "result", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "The whole procedural routine, rewritten as a functional pipeline, fits in only 12 lines."}, {"id": "fp44", "x": -204.9, "y": -260.0, "t": "philosophy", "ty": "opinion", "c": "CORE", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Most programming jobs are just taking data from source A, doing transformation/filtering/sorting, and putting it in place B — a lot of the time we&#x27;re just sophisticated plumbers."}, {"id": "fp45", "x": -516.8, "y": -471.6, "t": "philosophy", "ty": "opinion", "c": "CORE", "at": "creator", "r": 6.699999999999999, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Pure functional programming — where you cannot mutate any state or have any side effects — is kind of awful, and in a sense fake."}, {"id": "fp46", "x": -597.0, "y": -422.0, "t": "philosophy", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Computers fundamentally have state: the Von Neumann architecture is one giant state in memory with little instructions that mutate it."}, {"id": "fp47", "x": -421.3, "y": -459.9, "t": "philosophy", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Input is non-deterministic and any output forces some side effect, so pure statelessness can&#x27;t fully exist."}, {"id": "fp48", "x": -696.3, "y": -554.3, "t": "philosophy", "ty": "opinion", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Pure functional programming is still mostly academic."}, {"id": "fp49", "x": -763.7, "y": -491.3, "t": "philosophy", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "What has happened is that the best parts of functional programming have been extracted and injected into our most popular languages."}, {"id": "fp50", "x": -603.4, "y": -499.7, "t": "philosophy", "ty": "opinion", "c": "CORE", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Balance is key: adopting principles like reducing state and forming data pipelines where it makes sense brings huge benefit without the crazy restrictiveness of pure FP."}, {"id": "fp51", "x": -775.2, "y": -588.9, "t": "philosophy", "ty": "prediction", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Expect these functional patterns to become more common."}, {"id": "fp52", "x": -692.7, "y": -439.7, "t": "philosophy", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Massively parallel systems don&#x27;t rely on one big state of memory; the more cores you add, the more tracking shared state becomes a bottleneck."}, {"id": "fp53", "x": -612.8, "y": -594.8, "t": "philosophy", "ty": "prediction", "c": "STATED", "at": "creator", "r": 3.9, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Pure functional programming may have a new renaissance as parallelism grows."}, {"id": "fp54", "x": -852.4, "y": -533.5, "t": "philosophy", "ty": "style", "c": "STATED", "at": "creator", "r": 2.5, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "Recurring affectionate address to the audience: &#x27;dear functional bros, I see you, I hear you, and I love you.&#x27;"}, {"id": "fp55", "x": 860.5, "y": 10.3, "t": "functional", "ty": "example", "c": "STATED", "at": "hypothetical", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "A satirical fake-startup ad (&#x27;Black Sky Financial&#x27;) frames the receipts demo — a parody company that sues mom-and-pop restaurants over tip discrepancies."}, {"id": "fp56", "x": 1139.5, "y": 102.3, "t": "functional", "ty": "caveat", "c": "STATED", "at": "creator", "r": 3.2, "s": "nuML9SmdbJ4", "u": "https://www.youtube.com/watch?v=nuML9SmdbJ4", "x2": "After deriving the functional fundamentals by hand, you can remove unneeded variables to make the code more concise."}, {"id": "di01", "x": -705.9, "y": 542.2, "t": "dependency-injection", "ty": "opinion", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "&#x27;Dependency injection&#x27; is a term the creator doesn&#x27;t love because it sounds a lot fancier than it actually is."}, {"id": "di02", "x": -591.8, "y": 364.8, "t": "dependency-injection", "ty": "definition", "c": "CORE", "at": "creator", "r": 6.0, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Dependency injection is simply when code that uses another piece of code, instead of using it directly, has that code passed in; passing it in is the &#x27;injection&#x27;."}, {"id": "di03", "x": -491.6, "y": 627.2, "t": "dependency-injection", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Though the idea is simple, it unlocks some very powerful side effects."}, {"id": "di04", "x": -562.7, "y": 624.5, "t": "dependency-injection", "ty": "example", "c": "STATED", "at": "creator", "r": 4.6, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "The running example is a business chat app where users message co-workers and send pictures and files; attachments go to an attachment service that stores, retrieves, and processes them."}, {"id": "di05", "x": -618.2, "y": 519.3, "t": "dependency-injection", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Message text goes to a standard chat service built for speed (near real-time), while the attachment goes to the separate attachment service."}, {"id": "di06", "x": -999.4, "y": 563.8, "t": "dependency-injection", "ty": "method", "c": "STATED", "at": "creator", "r": 4.6, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "On upload, the attachment is stored on disk temporarily, processed in several ways, then uploaded to its final destination."}, {"id": "di07", "x": -973.5, "y": 363.5, "t": "dependency-injection", "ty": "definition", "c": "STATED", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "The default storage location is S3, Amazon&#x27;s simple storage service for putting up and pulling down files."}, {"id": "di08", "x": -881.1, "y": 323.3, "t": "dependency-injection", "ty": "caveat", "c": "STATED", "at": "creator", "r": 4.6, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "A few client firms don&#x27;t want their data permanently stored, so the service must handle multiple storage locations chosen by which company a user belongs to."}, {"id": "di09", "x": -828.0, "y": 244.2, "t": "dependency-injection", "ty": "example", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Most picky clients provide an SFTP server, but one client specifically wanted WebDAV."}, {"id": "di10", "x": -909.1, "y": 403.7, "t": "dependency-injection", "ty": "warning", "c": "CORE", "at": "creator", "r": 5.3, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "The naive approach — extend the upload code with if-statements and have the caller pass in where to upload — intermingles SFTP, AWS, and WebDAV code in one class with many paths, making it ugly and hard to understand."}, {"id": "di11", "x": -904.8, "y": 559.9, "t": "dependency-injection", "ty": "warning", "c": "CORE", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Because each destination needs different info (AWS keys vs SFTP address/private key vs WebDAV URL and auth), the naive upload forces a bunch of optional variables and comments, making it easy for the caller to make a mistake."}, {"id": "di12", "x": -916.6, "y": 657.5, "t": "dependency-injection", "ty": "warning", "c": "STATED", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "The naive approach forces the calling code to carry destination-specific context even though at that phase it just wants to upload; the code that actually knows the company is up at the start of the request."}, {"id": "di13", "x": -554.0, "y": 455.9, "t": "dependency-injection", "ty": "method", "c": "CORE", "at": "creator", "r": 4.6, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "The DI solution: create a storage interface with an upload method that does what the request handler wants."}, {"id": "di14", "x": -784.9, "y": 534.3, "t": "dependency-injection", "ty": "method", "c": "CORE", "at": "creator", "r": 4.6, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Create three implementations of the storage interface, passing each one&#x27;s configuration into its constructor — no optional variables, required values, and an error if you forget one."}, {"id": "di15", "x": -684.7, "y": 366.2, "t": "dependency-injection", "ty": "method", "c": "CORE", "at": "creator", "r": 5.3, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Once the user is authenticated and their company is known, create the right storage and inject only that storage into the request handler."}, {"id": "di16", "x": -625.2, "y": 700.4, "t": "dependency-injection", "ty": "concept", "c": "CORE", "at": "creator", "r": 4.6, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "The request handler isn&#x27;t aware of which storage is passed in or where the file is going — it just knows it can call upload."}, {"id": "di17", "x": -637.7, "y": 414.0, "t": "dependency-injection", "ty": "method", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Since the construction code is too complex to sit in the handler, move it out to a factory whose input is the company configuration and whose output is a storage conforming to the interface."}, {"id": "di18", "x": -828.0, "y": 398.4, "t": "dependency-injection", "ty": "concept", "c": "STATED", "at": "creator", "r": 6.0, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Beyond final storage, an upload passes through stages: virus scan, image scaling, preview generation, and encryption."}, {"id": "di19", "x": -761.6, "y": 471.6, "t": "dependency-injection", "ty": "definition", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "The virus scanner checks files for signatures of obvious viruses."}, {"id": "di20", "x": -504.7, "y": 388.9, "t": "dependency-injection", "ty": "method", "c": "STATED", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "If the file is an image it&#x27;s scaled down to a max width of 2500 pixels, which is what&#x27;s shown when a user clicks an image because it uses less bandwidth and loads faster."}, {"id": "di21", "x": -874.0, "y": 746.9, "t": "dependency-injection", "ty": "definition", "c": "STATED", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Preview generation makes the thumbnail shown under an attachment so the user can see what it is without fully downloading it."}, {"id": "di22", "x": -746.9, "y": 400.3, "t": "dependency-injection", "ty": "method", "c": "STATED", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Files stored on S3 are pre-encrypted before upload, so a breach at Amazon only exposes encrypted files."}, {"id": "di23", "x": -622.3, "y": 283.5, "t": "dependency-injection", "ty": "example", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "They currently use the ThreatProtect scanner but plan to switch to Synergy Security (better detection KPIs); the deal isn&#x27;t finalized, so Synergy may only be tested in development, not production."}, {"id": "di24", "x": -777.3, "y": 746.0, "t": "dependency-injection", "ty": "method", "c": "CORE", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Create a shared interface for the two scanners and, on initialization, pick one and inject it: Synergy in development mode, the old ThreatProtect in production."}, {"id": "di25", "x": -539.3, "y": 546.3, "t": "dependency-injection", "ty": "method", "c": "STATED", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Image scaling (the sharp library) is wrapped in an image-scaler interface that also reports whether an attachment supports scaling, so the upload only scales when supported."}, {"id": "di26", "x": -743.4, "y": 627.8, "t": "dependency-injection", "ty": "method", "c": "STATED", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Preview generation, the most complex stage, uses a preview-generator interface taking the input file and returning a preview image, with implementations for documents, videos, and images."}, {"id": "di27", "x": -814.8, "y": 676.4, "t": "dependency-injection", "ty": "method", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "The image preview generator reuses the same image scaler by injecting it in, rather than reimplementing scaling."}, {"id": "di28", "x": -701.7, "y": 688.1, "t": "dependency-injection", "ty": "method", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Since only one preview generator is needed per file type, inject a factory that takes the upload&#x27;s mime type and returns the right generator, so the upload just asks the factory and uses it."}, {"id": "di29", "x": -785.7, "y": 326.6, "t": "dependency-injection", "ty": "method", "c": "STATED", "at": "creator", "r": 4.6, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Encryption has one implementation (AES) but a per-user key from a key service, so inject the key service into the AES encryption and the AES encryption into the storage factory."}, {"id": "di30", "x": -677.8, "y": 785.9, "t": "dependency-injection", "ty": "example", "c": "STATED", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "For an AWS-configured company the storage factory injects AES encryption into the new AWS storage, and the upload calls upload without knowing about the whole chain of connected functionality."}, {"id": "di31", "x": -678.2, "y": 636.1, "t": "dependency-injection", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "The complete architecture is configurable from one spot, making it super easy to change — switching to Synergy is two lines, and adding preview support for a new file type just slots in."}, {"id": "di32", "x": -637.5, "y": 561.0, "t": "dependency-injection", "ty": "caveat", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "With no access to the key server on a local dev box, you can just inject a fixed key when running locally."}, {"id": "di33", "x": -856.2, "y": 588.8, "t": "dependency-injection", "ty": "analogy", "c": "CORE", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Injection basically lets you pick and choose from your compatible puzzle pieces and slot them in when you need them."}, {"id": "di34", "x": -712.5, "y": 266.3, "t": "dependency-injection", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Injection timing varies: some dependencies are resolved and injected at startup (most common), some when a request comes in, but the process is the same — code lists the dependencies it needs and you fulfill them."}, {"id": "di35", "x": -953.9, "y": 487.5, "t": "dependency-injection", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "The biggest reason to use interfaces and injection even with a single implementation is testing."}, {"id": "di36", "x": -702.0, "y": 449.3, "t": "dependency-injection", "ty": "concept", "c": "CORE", "at": "creator", "r": 6.699999999999999, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Because components talk through injected interfaces, you control what&#x27;s used at each connection point — including injecting fake or mock implementations to slice and isolate sections of the architecture during testing."}, {"id": "di37", "x": -439.1, "y": 552.1, "t": "dependency-injection", "ty": "example", "c": "STATED", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "To test the AWS storage class, inject a fake local S3 that pretends to be the cloud, call upload, and verify a file got uploaded."}, {"id": "di38", "x": -522.0, "y": 702.3, "t": "dependency-injection", "ty": "example", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "Since encryption would block checking the file content, inject a mock encryption that disables encryption, so the test can fully verify uploading in isolation."}, {"id": "di39", "x": -478.8, "y": 467.4, "t": "dependency-injection", "ty": "example", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "To test encryption itself, mock out the key store to return a controlled key instead of going to the real key service."}, {"id": "di40", "x": -858.6, "y": 503.1, "t": "dependency-injection", "ty": "example", "c": "STATED", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "To integration-test AWS and encryption together, inject a fake keystore into the real encryption and the real encryption into the AWS storage."}, {"id": "di41", "x": -28.6, "y": -441.1, "t": "craft", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.9, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "A natural side effect of having nice code is that it&#x27;s easy to test without needing to hack around the code structure."}, {"id": "di42", "x": 180.8, "y": -717.5, "t": "craft", "ty": "warning", "c": "CORE", "at": "creator", "r": 3.2, "s": "J1f5b4vcxCQ", "u": "https://www.youtube.com/watch?v=J1f5b4vcxCQ", "x2": "If you find yourself asking &#x27;how can I test a private method&#x27; or &#x27;I need to set an internal variable to test&#x27;, that&#x27;s a signal you need to pull some part out and isolate it by injecting it instead."}, {"id": "po01", "x": 333.0, "y": 710.9, "t": "performance", "ty": "opinion", "c": "CORE", "at": "creator", "r": 6.0, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "The creator truly believes that premature optimization is the root of all evil."}, {"id": "po02", "x": 400.8, "y": 1074.9, "t": "performance", "ty": "opinion", "c": "CORE", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Most conversations about performance are a total waste of time — not because performance isn&#x27;t important, but because people feel very, very strongly about it."}, {"id": "po03", "x": 180.9, "y": 861.1, "t": "performance", "ty": "concept", "c": "CORE", "at": "creator", "r": 5.3, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Performance is one element of a trade-off triangle whose other two corners are velocity and adaptability."}, {"id": "po04", "x": 465.2, "y": 989.8, "t": "performance", "ty": "definition", "c": "STATED", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Velocity is how quickly one adds new features."}, {"id": "po05", "x": 247.4, "y": 706.5, "t": "performance", "ty": "definition", "c": "STATED", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Adaptability is how well the system can change to new requirements."}, {"id": "po06", "x": 308.0, "y": 956.7, "t": "performance", "ty": "warning", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Pure velocity — hacking something together by the shortest path, future maintainers be damned — gives immediate speed but creates technical debt that eventually weighs you to a halt."}, {"id": "po07", "x": 254.0, "y": 880.1, "t": "performance", "ty": "claim", "c": "STATED", "at": "creator", "r": 5.3, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Adaptability means writing code to enable change: reusable extensible components, beautifully crafted interfaces, and configurability."}, {"id": "po08", "x": 492.4, "y": 692.6, "t": "performance", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "With the right designs, adaptability can increase velocity by reducing the size of the changes needed to add new features."}, {"id": "po09", "x": 132.3, "y": 1105.2, "t": "performance", "ty": "warning", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Too much adaptability also hurts velocity: building for a bunch of use cases that never happen just ends up being wasted time."}, {"id": "po10", "x": 373.0, "y": 566.7, "t": "performance", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Adding adaptability naturally adds abstraction and indirection, which usually hurts performance — but the trade-off is usually worth it for the adaptability gained."}, {"id": "po11", "x": 23.9, "y": 694.1, "t": "performance", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Where to sit on the triangle depends on the stage of your project, not a fixed &#x27;always aim for the middle&#x27; rule."}, {"id": "po12", "x": 269.3, "y": 1026.1, "t": "performance", "ty": "example", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "A feature-complete game near its ship date would focus on performance, accepting reduced velocity and adaptability; a game early in development would favor features and an extensible system."}, {"id": "po13", "x": 143.9, "y": 933.2, "t": "performance", "ty": "example", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Zuckerberg wrote Facebook in PHP — an awkward language that caused scaling issues; they later built a PHP-to-C++ compiler and then a PHP dialect called Hack."}, {"id": "po14", "x": 488.3, "y": 892.8, "t": "performance", "ty": "opinion", "c": "CORE", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Writing Facebook in inconsistent, inefficient PHP was the right move because it let Zuckerberg build quickly; once performance became a real problem, engineers solved it — starting in optimized C might have meant it never took off."}, {"id": "po15", "x": 294.3, "y": 777.1, "t": "performance", "ty": "claim", "c": "CORE", "at": "creator", "r": 5.3, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Performance is a problem, but it&#x27;s not usually the first problem — be deliberate about which way you&#x27;re leaning."}, {"id": "po16", "x": 173.9, "y": 572.5, "t": "performance", "ty": "definition", "c": "CORE", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Macro performance is design-level, system-wide performance; micro performance is fine-tuned performance of a single module or function."}, {"id": "po17", "x": 420.5, "y": 833.1, "t": "performance", "ty": "claim", "c": "STATED", "at": "creator", "r": 6.0, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Premature optimization usually occurs for micro performance — typically the code-review comment that you should do X instead of Y because X is faster."}, {"id": "po18", "x": 76.1, "y": 1016.6, "t": "performance", "ty": "example", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "His own animation Python code linear-searches a big character array every frame and still renders the videos fast enough that it&#x27;s not worth making faster."}, {"id": "po19", "x": -179.9, "y": 290.4, "t": "philosophy", "ty": "opinion", "c": "CORE", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "You write code to solve a real-world problem, and getting to that solution faster is typically better than solving it slower with faster code."}, {"id": "po20", "x": 409.7, "y": 664.0, "t": "performance", "ty": "example", "c": "STATED", "at": "creator", "r": 5.3, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "C++ has ++i and i++; proponents claim ++i is faster because i++ must copy the value, since when part of a larger expression the increment must happen after evaluation."}, {"id": "po21", "x": 180.6, "y": 683.4, "t": "performance", "ty": "opinion", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "You shouldn&#x27;t blindly trust a claim that something is faster; verify it — which here meant disassembling the code."}, {"id": "po22", "x": 275.3, "y": 826.4, "t": "performance", "ty": "result", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "For an int, pre-increment and post-increment disassemble to identical code (load into a register, add one, store back)."}, {"id": "po23", "x": 119.8, "y": 725.3, "t": "performance", "ty": "result", "c": "STATED", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "For a vector iterator, post-increment has four extra assembly lines to copy the iterator and call into the other operator."}, {"id": "po24", "x": 39.1, "y": 931.7, "t": "performance", "ty": "result", "c": "CORE", "at": "creator", "r": 4.6, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "But once optimization is turned on, those extra function calls completely disappear and you get identical code for both ++i and i++."}, {"id": "po25", "x": 187.7, "y": 779.6, "t": "performance", "ty": "number", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Measured on his MacBook, the slowest increment is 3.4 nanoseconds."}, {"id": "po26", "x": 193.4, "y": 954.1, "t": "performance", "ty": "opinion", "c": "CORE", "at": "creator", "r": 4.6, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Ask whether the conversation is even worth it: if figuring out which is technically faster brings you joy, go for it, but it shouldn&#x27;t end up in a code review because it doesn&#x27;t matter."}, {"id": "po27", "x": 225.2, "y": 1106.1, "t": "performance", "ty": "style", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "He likes i++ because he thinks it looks prettier and sticks with it until someone measures that the app is too slow and that changing it is the fix."}, {"id": "po28", "x": 349.8, "y": 876.0, "t": "performance", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Some argue functions are expensive, but rarely is the cost of a function so significant that removing it is the solution to a performance problem — and even then it doesn&#x27;t prove the readability loss is worth it."}, {"id": "po29", "x": 292.5, "y": 553.6, "t": "performance", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "A big issue with making performance rules to follow is that the rules often have a lot of exceptions."}, {"id": "po30", "x": 248.6, "y": 625.1, "t": "performance", "ty": "example", "c": "STATED", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Example: a logged-in-users class searches an array with a for loop; a reviewer says to use a set for faster unique lookups."}, {"id": "po31", "x": 78.1, "y": 858.0, "t": "performance", "ty": "result", "c": "CORE", "at": "creator", "r": 4.6, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Measuring shows the set is actually slower when only a few users are logged in (the normal case), likely because the array&#x27;s integers sit adjacent in memory while the set allocates objects scattered around, reducing cache hits."}, {"id": "po32", "x": 23.6, "y": 788.2, "t": "performance", "ty": "opinion", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Until you&#x27;ve shown a function is the leading cause of performance issues, go with what&#x27;s more readable; here the set is cleaner and less bug-prone, so he&#x27;d still choose it."}, {"id": "po33", "x": 403.8, "y": 911.7, "t": "performance", "ty": "method", "c": "CORE", "at": "creator", "r": 4.6, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "There&#x27;s only one way to properly optimize: measure, try something, measure again."}, {"id": "po34", "x": 126.8, "y": 804.7, "t": "performance", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Measuring is critical because your assumptions about what will make things faster can actually make them slower."}, {"id": "po35", "x": 176.1, "y": 1026.8, "t": "performance", "ty": "claim", "c": "CORE", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Data-structure selection is by far the most important factor, because the right data structure gives dramatically better results than the wrong one."}, {"id": "po36", "x": 3.2, "y": 856.7, "t": "performance", "ty": "method", "c": "CORE", "at": "creator", "r": 4.6, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Think in &#x27;80% moves&#x27; first — changes that could give an 80% reduction — and often only data-structure changes get you that far."}, {"id": "po37", "x": 91.5, "y": 632.0, "t": "performance", "ty": "method", "c": "STATED", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "If 80% moves aren&#x27;t enough, use a profiler to find the hot spots — the functions that are most expensive."}, {"id": "po38", "x": 407.3, "y": 729.3, "t": "performance", "ty": "example", "c": "STATED", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "A player named &#x27;tossed&#x27; profiled GTA 5 Online without source code, found nearly all the time was spent parsing a JSON file, and a patch fixing just that improved load time by 70%."}, {"id": "po39", "x": 360.2, "y": 993.1, "t": "performance", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Sometimes when things are slow it&#x27;s just one silly thing slowing everything down."}, {"id": "po40", "x": 493.6, "y": 778.3, "t": "performance", "ty": "claim", "c": "STATED", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "A lot of performance comes from how code uses memory: allocating memory (a new object or array) slows critical sections because the system must find free chunks, and keeping critical elements close in memory exploits the CPU cache."}, {"id": "po41", "x": 321.1, "y": 630.4, "t": "performance", "ty": "caveat", "c": "CORE", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Don&#x27;t worry about memory-level concerns until you know you have a performance problem and have tried other things first."}, {"id": "po42", "x": 336.8, "y": 793.6, "t": "performance", "ty": "method", "c": "CORE", "at": "creator", "r": 3.9, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "The ordered optimization recipe: have a real performance problem, measure it, make 80% moves by swapping data structures or moving to a faster algorithm, profile for hot spots, and worst case start reasoning about what the code does under the hood."}, {"id": "po43", "x": -363.4, "y": -41.7, "t": "philosophy", "ty": "opinion", "c": "STATED", "at": "creator", "r": 3.2, "s": "tKbV6BpH-C8", "u": "https://www.youtube.com/watch?v=tKbV6BpH-C8", "x2": "Spending three hours investigating a micro-optimization is time you could have spent building the actual product."}], "edges": function reheat(a){
  if (REDUCE_MOTION && !grabbed){ draw(); return; }   // honor OS reduced-motion: no autoplay sim
  alpha = Math.max(alpha, a); if(!running){ running = true; requestAnimationFrame(loop); }
}

function tick(){
  const grid = {};
  for (const n of N){ const k = Math.round(n.x/CS)+','+Math.round(n.y/CS); (grid[k]||(grid[k]=[])).push(n); }
  for (const n of N){
    let fx=0, fy=0; const gx=Math.round(n.x/CS), gy=Math.round(n.y/CS);
    for (let ix=-1;ix<=1;ix++) for (let iy=-1;iy<=1;iy++){
      const c = grid[(gx+ix)+','+(gy+iy)]; if(!c) continue;
      for (const m of c){ if(m===n) continue;
        let dx=n.x-m.x, dy=n.y-m.y, d2=dx*dx+dy*dy;
        if(d2<1e-3){ dx=Math.random()-.5; dy=Math.random()-.5; d2=1; }
        if(d2<R2){ const f=L2/d2; fx+=dx*f; fy+=dy*f; } } }
    n.vx += fx*0.04*alpha; n.vy += fy*0.04*alpha;
  }
  for (const e of E){ const a=byid[e.a], b=byid[e.b];
    let dx=b.x-a.x, dy=b.y-a.y, d=Math.hypot(dx,dy)||1;
    const f=(d-L)/d*0.06*alpha, fx=dx*f, fy=dy*f;
    a.vx+=fx; a.vy+=fy; b.vx-=fx; b.vy-=fy; }
  for (const n of N){ const c=cc[n.t]; if(c){ n.vx+=(c[0]-n.x)*0.004*alpha; n.vy+=(c[1]-n.y)*0.004*alpha; } }
  for (const n of N){ if(n===grabbed){ n.vx=0; n.vy=0; continue; }
    n.x+=n.vx; n.y+=n.vy; n.vx*=0.85; n.vy*=0.85; }
  alpha *= 0.99;
  return alpha > 0.012 || grabbed;
}
function loop(){ const live = tick(); draw(); if(live) requestAnimationFrame(loop); else running=false; }

// ---- search / filter state ----
let query = '', matchCount = 0, selected = null;
const activeConf = new Set(N.map(n => n.c));   // confidence filter: all on by default
function applyFilter(){
  matchCount = 0;
  for (const n of N){
    const q = query && n.x2.toLowerCase().includes(query);
    n.match = !!q; if (q) matchCount++;
    const confOff = !activeConf.has(n.c);
    n.dim = (query && !q) || n.hidden || confOff;
    n.hit = !n.hidden && !confOff;
  }
  $('searchcount').textContent = query ? matchCount + '' : '';
}

// confidence filter buttons (CORE / STATED / INFERRED, only those present)
const confSeg = $('confSeg');
const CONF_ORDER = ['CORE','STATED','INFERRED'];
const confPresent = CONF_ORDER.filter(c => N.some(n => n.c === c))
  .concat([...new Set(N.map(n => n.c))].filter(c => !CONF_ORDER.includes(c) && c));
confPresent.forEach(c => {
  const b = document.createElement('button'); b.textContent = c; b.className = 'on';
  b.onclick = () => {
    if (activeConf.has(c)) activeConf.delete(c); else activeConf.add(c);
    b.classList.toggle('on', activeConf.has(c));
    applyFilter(); if (!running) draw();
  };
  confSeg.appendChild(b);
});

// ---- render ----
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#07080f'; ctx.fillRect(0,0,W,H);
  // edges — additive, tinted by source topic
  ctx.globalCompositeOperation = 'lighter';
  ctx.lineWidth = Math.max(.35, scale*.9);
  ctx.beginPath(); let cur='';
  for (const e of E){ const a=byid[e.a], b=byid[e.b];
    if (a.dim || b.dim) continue;
    const col = (DATA.colors[a.t]||'#888') + '20';
    if (col!==cur){ ctx.stroke(); ctx.strokeStyle=col; ctx.beginPath(); cur=col; }
    ctx.moveTo(sx(a.x),sy(a.y)); ctx.lineTo(sx(b.x),sy(b.y)); }
  ctx.stroke();
  // selection edges — bright, with relationship labels at their midpoints
  if (selected){
    ctx.strokeStyle = 'rgba(255,255,255,.55)'; ctx.lineWidth = Math.max(.8, scale*1.4);
    ctx.beginPath();
    const labels = [];
    for (const e of E){ if(e.a===selected.id||e.b===selected.id){
      const a=byid[e.a], b=byid[e.b];
      ctx.moveTo(sx(a.x),sy(a.y)); ctx.lineTo(sx(b.x),sy(b.y));
      labels.push([(sx(a.x)+sx(b.x))/2, (sy(a.y)+sy(b.y))/2, relWord[e.r]||e.r]); } }
    ctx.stroke();
    if (scale > 1.4){   // only label edges once the user has zoomed in past the default fit
      ctx.font = '10px -apple-system,Segoe UI,sans-serif'; ctx.textAlign = 'center';
      for (const [mx,my,word] of labels){
        const w = ctx.measureText(word).width + 8;
        ctx.fillStyle = 'rgba(10,12,24,.82)';
        ctx.fillRect(mx-w/2, my-7, w, 14);
        ctx.fillStyle = '#cdd3e0'; ctx.fillText(word, mx, my+3);
      }
      ctx.textAlign = 'start';
    }
  }
  const k = Math.sqrt(scale);
  // halos
  for (const n of N){ if(n.dim) continue;
    const r = Math.max(1.2, n.r*k*1.6), col = DATA.colors[n.t]||'#888';
    ctx.fillStyle = col + (n.match ? '70' : '30');
    ctx.beginPath(); ctx.arc(sx(n.x),sy(n.y), r*2.1, 0, 7); ctx.fill(); }
  ctx.globalCompositeOperation = 'source-over';
  // solid nodes
  for (const n of N){
    const r = Math.max(1.2, n.r*k*1.6), col = DATA.colors[n.t]||'#888';
    if (n.dim){ ctx.fillStyle = 'rgba(120,126,150,.12)'; }
    else if (n===selected){ ctx.fillStyle = '#fff'; }
    else { ctx.fillStyle = col; }
    ctx.beginPath(); ctx.arc(sx(n.x),sy(n.y), r, 0, 7); ctx.fill();
    if (n===selected || (n.match && query)){
      ctx.strokeStyle = n===selected ? '#fff' : col;
      ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(sx(n.x),sy(n.y), r+3, 0, 7); ctx.stroke();
    }
  }
  drawMini();
}

// ---- minimap (bottom-right): whole-graph overview + current viewport rectangle ----
const mini = $('mini'), mctx = mini && mini.getContext ? mini.getContext('2d') : null;
const MW = 176, MH = 116;
let miniBounds = null;
if (mini){ mini.width = MW*DPR; mini.height = MH*DPR; if(mctx) mctx.setTransform(DPR,0,0,DPR,0,0); }
function drawMini(){
  if (!mctx || !N.length) return;
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for (const n of N){ if(n.x<x0)x0=n.x; if(n.y<y0)y0=n.y; if(n.x>x1)x1=n.x; if(n.y>y1)y1=n.y; }
  const pad=10, sw=(x1-x0)||1, sh=(y1-y0)||1, k=Math.min((MW-pad*2)/sw,(MH-pad*2)/sh);
  const ox2=(MW-sw*k)/2-x0*k, oy2=(MH-sh*k)/2-y0*k;
  miniBounds={k,ox2,oy2};
  mctx.clearRect(0,0,MW,MH);
  for (const n of N){ if(n.dim) continue;
    mctx.fillStyle=DATA.colors[n.t]||'#888';
    mctx.fillRect(n.x*k+ox2-0.6, n.y*k+oy2-0.6, 1.6, 1.6); }
  const vx=wx(0)*k+ox2, vy=wy(0)*k+oy2, vw=(wx(W)-wx(0))*k, vh=(wy(H)-wy(0))*k;
  mctx.strokeStyle='rgba(255,255,255,.7)'; mctx.lineWidth=1; mctx.strokeRect(vx,vy,vw,vh);
}
if (mini){
  mini.addEventListener('pointerdown', e => {
    if (!miniBounds) return;
    const r = mini.getBoundingClientRect();
    const wxp=(e.clientX-r.left-miniBounds.ox2)/miniBounds.k;
    const wyp=(e.clientY-r.top-miniBounds.oy2)/miniBounds.k;
    ox = W/2 - wxp*scale; oy = H/2 - wyp*scale;   // center the clicked world point
    if(!running) draw();
  });
}

// ---- PNG export of the current canvas view ----
{ const eb = $('exportBtn');
  if (eb) eb.onclick = () => {
    const a = document.createElement('a');
    a.download = (DATA.name||'engram') + '-graph.png';
    a.href = cv.toDataURL('image/png'); a.click();
  };
}

function pick(px,py){
  let best=null, bd=18;
  for (const n of N){ if(!n.hit) continue;
    const d = Math.hypot(px-sx(n.x), py-sy(n.y)); if(d<bd){ bd=d; best=n; } }
  return best;
}

// ---- detail panel ----
const relWord = { 'because':'because','defines':'defines','part-of':'part of',
  'example-of':'example of','analogy-for':'analogy for','evidence-for':'evidence for',
  'qualifies':'qualifies','contrast':'contrasts','contradicts':'contradicts',
  'leads-to':'leads to','enables':'enables','depends-on':'depends on','generalizes':'generalizes',
  'uses':'uses','method-for':'method for','supports':'supports','about':'about','enabled-by':'enabled by' };
function showDetail(n){
  selected = n;
  $('dBar').style.background = DATA.colors[n.t] || '#888';
  const tags = [`<span class="chip ty">${n.ty}</span>`,
    `<span class="chip" style="border-color:${DATA.colors[n.t]}66;color:${DATA.colors[n.t]}">${n.t}</span>`,
    `<span class="chip">${n.c}</span>`];
  if (n.at && n.at !== 'creator') tags.push(`<span class="chip" style="border-color:#ffb74d66;color:#ffb74d">${n.at}</span>`);
  $('dTags').innerHTML = tags.join('');
  $('dTxt').textContent = n.x2;
  const url = n.u || (/^[A-Za-z0-9_-]{11}$/.test(n.s) ? 'https://youtu.be/'+n.s : '');
  $('dSrc').innerHTML = n.s
    ? `<a href="${url||'#'}" target="_blank" rel="noopener">
         <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
         <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/>
         <line x1="10" y1="14" x2="21" y2="3"/></svg> source · ${n.s}</a>`
    : '';
  // neighbors
  const nbs = [];
  for (const e of E){
    if (e.a===n.id) nbs.push([relWord[e.r]||e.r, byid[e.b], '→']);
    else if (e.b===n.id) nbs.push([relWord[e.r]||e.r, byid[e.a], '←']);
  }
  const nh = $('dNeigh');
  if (nbs.length){
    nh.innerHTML = `<h4>${nbs.length} connection${nbs.length>1?'s':''}</h4>` + nbs.slice(0,12).map(([r,m,d]) =>
      `<div class="nb" data-id="${m.id}"><span class="rel">${d} ${r}</span>
       <span class="ntext">${m.x2.slice(0,80)}${m.x2.length>80?'…':''}</span></div>`).join('');
    nh.querySelectorAll('.nb').forEach(el => el.onclick = () => {
      const t = byid[el.dataset.id]; showDetail(t); focusNode(t); });
  } else nh.innerHTML = '<h4>no connections</h4>';
  $('detail').classList.add('show');
  if (!running) draw();
}
function focusNode(n){
  const tx = W/2 - n.x*scale, ty = H/2 - n.y*scale;
  if (REDUCE_MOTION){ ox = tx; oy = ty; if(!running) draw(); return; }
  const t0 = ox, t1 = oy, dur = 360, start = performance.now();
  (function anim(t){ const k = Math.min(1,(t-start)/dur), e = 1-(1-k)*(1-k);
    ox = t0 + (tx-t0)*e; oy = t1 + (ty-t1)*e; if(!running) draw();
    if (k<1) requestAnimationFrame(anim); })(start);
}
function closeDetail(){ selected=null; $('detail').classList.remove('show'); if(!running) draw(); }
$('dClose').onclick = closeDetail;

// ---- pointer interaction (mouse + touch unified) ----
const tip = $('tip');
let pan=false, lx, ly, moved, downX, downY, vlx=0, vly=0;
cv.addEventListener('pointerdown', e => {
  cv.setPointerCapture(e.pointerId);
  const n = pick(e.clientX, e.clientY);
  if (n){ grabbed = n; reheat(0.9); } else pan = true;
  lx=e.clientX; ly=e.clientY; downX=e.clientX; downY=e.clientY; moved=false;
  tip.style.display='none';
});
cv.addEventListener('pointermove', e => {
  if (grabbed){ const nx=wx(e.clientX), ny=wy(e.clientY);
    vlx=nx-grabbed.x; vly=ny-grabbed.y; grabbed.x=nx; grabbed.y=ny; reheat(0.6); moved=true; return; }
  if (pan){ ox+=e.clientX-lx; oy+=e.clientY-ly; lx=e.clientX; ly=e.clientY; moved=true;
    if(!running) draw(); return; }
  const n = pick(e.clientX, e.clientY);
  if (n){ cv.style.cursor='grab';
    tip.style.display='block';
    tip.style.left = Math.min(e.clientX+14, W-300)+'px';
    tip.style.top = Math.min(e.clientY+14, H-70)+'px';
    tip.innerHTML = `<span class="tt" style="color:${DATA.colors[n.t]||'#fff'}">[${n.ty}]</span> `
      + `<span class="tm">${n.c} · ${n.t}</span><br>${n.x2.slice(0,140)}${n.x2.length>140?'…':''}`;
  } else { cv.style.cursor='default'; tip.style.display='none'; }
});
cv.addEventListener('pointerup', e => {
  if (grabbed){ grabbed.vx=vlx; grabbed.vy=vly; const g=grabbed; grabbed=null; reheat(0.4);
    if(!moved) { showDetail(g); focusNode(g); } }
  else if (pan && !moved){ closeDetail(); }
  pan=false;
});
cv.addEventListener('wheel', e => { e.preventDefault();
  const f = e.deltaY<0 ? 1.12 : .89;
  ox=e.clientX-(e.clientX-ox)*f; oy=e.clientY-(e.clientY-oy)*f; scale*=f;
  if(!running) draw(); }, {passive:false});

// pinch-to-zoom (two-finger)
let pinchD=0;
cv.addEventListener('touchmove', e => {
  if (e.touches.length===2){ e.preventDefault();
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
                         e.touches[0].clientY-e.touches[1].clientY);
    if (pinchD){ const f=d/pinchD, mx=(e.touches[0].clientX+e.touches[1].clientX)/2,
      my=(e.touches[0].clientY+e.touches[1].clientY)/2;
      ox=mx-(mx-ox)*f; oy=my-(my-oy)*f; scale*=f; if(!running) draw(); }
    pinchD=d; }
}, {passive:false});
cv.addEventListener('touchend', () => pinchD=0);

// ---- search ----
const search = $('search');
search.addEventListener('input', () => {
  query = search.value.trim().toLowerCase(); applyFilter(); if(!running) draw();
});

// ---- keyboard ----
addEventListener('keydown', e => {
  if (e.key==='/' && document.activeElement!==search){ e.preventDefault(); search.focus(); }
  else if (e.key==='Escape'){ if(document.activeElement===search){ search.blur(); search.value=''; query=''; applyFilter(); } else closeDetail(); if(!running) draw(); }
  else if ((e.key==='f'||e.key==='F') && document.activeElement!==search){ fit(); reheat(0.5); }
});

addEventListener('resize', () => { size(); if(!running) draw(); });

// ---- boot ----
applyFilter(); fit(); draw();
if (N.length){
  reheat(0.7);
  setTimeout(() => $('load').classList.add('gone'), 480);
}
</script>
</body>
</html>
